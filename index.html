<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>hmmmmmmmmmmmmm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f187da;
    --bg-2:#171B37;
    --ticket:#1E2246;
    --ticket-edge:#2B3060;
    --ink:#F4F2EA;
    --ink-dim:#A6A4C4;
    --marigold:#FFB84D;
    --marigold-ink:#3A2400;
    --coral:#FF6F91;
    --mint:#6EE7B7;
    --mint-ink:#08321F;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 12% 8%, rgba(255,184,77,0.10), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(255,111,145,0.10), transparent 40%);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
  }
  .app{ width:100%; max-width:420px; }
  .stubs{ display:flex; gap:8px; justify-content:center; margin-bottom:18px; }
  .stub{
    flex:1; max-width:80px; height:6px; border-radius:4px;
    background:var(--ticket-edge);
    transition:background .3s ease;
  }
  .stub.done{ background:var(--marigold); }
  .card{
    position:relative;
    background:var(--ticket);
    border-radius:var(--radius);
    padding:32px 24px 28px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
    border:1px dashed var(--ticket-edge);
    overflow:hidden;
  }
  .card::before, .card::after{
    content:"";
    position:absolute;
    width:26px; height:26px;
    background:var(--bg);
    border-radius:50%;
    top:50%; transform:translateY(-50%);
  }
  .card::before{ left:-13px; }
  .card::after{ right:-13px; }
  .eyebrow{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--marigold);
    margin:0 0 8px;
  }
  h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:26px;
    line-height:1.25;
    margin:0 0 10px;
  }
  p.sub{
    color:var(--ink-dim);
    font-size:14px;
    line-height:1.6;
    margin:0 0 26px;
  }
  .screen{ display:none; }
  .screen.active{ display:block; animation:fade .35s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .yn-field{
    position:relative;
    height:190px;
    margin-bottom:8px;
  }
  .btn{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:16px;
    border:none;
    border-radius:14px;
    padding:14px 26px;
    cursor:pointer;
    transition:transform .12s ease;
  }
  .btn:active{ transform:scale(.96); }
  .btn-yes{
    background:var(--marigold);
    color:var(--marigold-ink);
    position:absolute;
    left:24px; top:20px;
  }
  .btn-no{
    background:var(--coral);
    color:#3A0A18;
    position:absolute;
    right:24px; top:20px;
    transition:top .28s cubic-bezier(.34,1.56,.64,1), left .28s cubic-bezier(.34,1.56,.64,1), transform .2s ease;
  }
  .dodge-note{
    font-size:12px;
    color:var(--ink-dim);
    min-height:16px;
    margin:0;
  }
  .field-label{
    display:block;
    font-size:13px;
    color:var(--ink-dim);
    margin-bottom:8px;
  }
  input[type="date"]{
    width:100%;
    background:var(--bg-2);
    border:1px solid var(--ticket-edge);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    font-size:16px;
    border-radius:12px;
    padding:14px 14px;
    margin-bottom:22px;
    outline:none;
    color-scheme:dark;
  }
  input[type="date"]:focus{ border-color:var(--marigold); }
  .btn-primary{
    width:100%;
    background:var(--marigold);
    color:var(--marigold-ink);
    padding:15px;
    font-size:16px;
    opacity:1;
  }
  .btn-primary:disabled{ opacity:.4; cursor:not-allowed; }

  .check{
    width:64px; height:64px;
    border-radius:50%;
    background:var(--mint);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 18px;
  }
  .check svg{ width:30px; height:30px; }
  .summary{
    background:var(--bg-2);
    border-radius:14px;
    padding:14px 16px;
    margin:18px 0;
  }
  .summary-row{
    display:flex; justify-content:space-between;
    font-size:14px; padding:6px 0;
    border-bottom:1px solid var(--ticket-edge);
  }
  .summary-row:last-child{ border-bottom:none; }
  .summary-row span:first-child{ color:var(--ink-dim); }
  .status-line{
    text-align:center;
    font-size:12px;
    color:var(--ink-dim);
    margin-top:16px;
  }
  .restart{
    display:block;
    text-align:center;
    margin-top:16px;
    font-size:13px;
    color:var(--marigold);
    background:none; border:none; cursor:pointer;
    font-family:'Space Grotesk', sans-serif;
  }
</style>
</head>
<body>
<div class="app">
  <div class="stubs">
    <div class="stub" id="stub-1"></div>
    <div class="stub" id="stub-2"></div>
    <div class="stub" id="stub-3"></div>
  </div>

  <div class="card">

    <section class="screen active" id="screen-1">
      <p class="eyebrow">Hi, Aksha</p>
      <h1> kya hua abhi tk naraj ho ?</h1>
      <p class="sub"></p>
      <div class="yn-field" id="yn-field">
        <button class="btn btn-yes" id="btn-yes">Yes</button>
        <button class="btn btn-no" id="btn-no">No</button>
      </div>
      <p class="dodge-note" id="dodge-note">&nbsp;</p>
    </section>

    <section class="screen" id="screen-2">
      <p class="eyebrow">ohh naraj ho </p>
      <h1>shayd kuch jyada hi overthink krthi ho tum meri trh</h1>
      <p class="sub">kis din free ho?   </p>
      <label class="field-label" for="date-input">Preferred date</label>
      <input type="date" id="date-input">
      <input type="text" id="hp-field" name="website" autocomplete="off" tabindex="-1" style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0;" aria-hidden="true">
      <button class="btn btn-primary" id="btn-continue" disabled>Continue</button>
    </section>

    <section class="screen" id="screen-3">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#08321F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1 style="text-align:center;">Thanks 
      </h1>
      <p class="sub" style="text-align:center;">thik hai</p>
      <div class="summary">
        <div class="summary-row"><span>kesa bna hai ye</span><span id="sum-answer">—</span></div>
        <div class="summary-row"><span></span><span id="sum-dodges">—</span></div>
        <div class="summary-row"><span></span><span id="sum-date">—</span></div>
      </div>
      <p class="status-line" id="save-status">Opening WhatsApp…</p>
      <button class="restart" id="btn-restart">Fill it out again</button>
    </section>

  </div>
</div>

<script>
(function(){
  // ---- WhatsApp config ----
  // Full number with country code, digits only, no + no spaces no dashes.
  // Example: country code 1, number 4721347320 -> '14721347320'
  var WHATSAPP_NUMBER = '';
  // --------------------------

  var pageLoadedAt = Date.now();
  var state = { dodges: 0, date: null, answer: 'yes' };

  var screens = { 1: document.getElementById('screen-1'), 2: document.getElementById('screen-2'), 3: document.getElementById('screen-3') };
  var stubs = { 1: document.getElementById('stub-1'), 2: document.getElementById('stub-2'), 3: document.getElementById('stub-3') };

  function goTo(n){
    Object.keys(screens).forEach(function(k){
      screens[k].classList.toggle('active', Number(k) === n);
    });
    Object.keys(stubs).forEach(function(k){
      stubs[k].classList.toggle('done', Number(k) <= n);
    });
  }

  var yesBtn = document.getElementById('btn-yes');
  var noBtn = document.getElementById('btn-no');
  var field = document.getElementById('yn-field');
  var dodgeNote = document.getElementById('dodge-note');

  var quips = [
    "tum ho!",
    "sahi me?",
    "lgta to nhi.",
    "muhje to lg raha h tum naraj ho.",
  ];

  function moveNoButton(){
    var fw = field.clientWidth, fh = field.clientHeight;
    var bw = noBtn.offsetWidth || 70, bh = noBtn.offsetHeight || 46;
    var maxLeft = Math.max(fw - bw - 8, 8);
    var maxTop = Math.max(fh - bh - 8, 8);
    var newLeft, newTop, tries = 0;
    var yesBox = { left: yesBtn.offsetLeft, top: yesBtn.offsetTop, right: yesBtn.offsetLeft + yesBtn.offsetWidth, bottom: yesBtn.offsetTop + yesBtn.offsetHeight };
    do {
      newLeft = Math.round(8 + Math.random() * (maxLeft - 8));
      newTop = Math.round(8 + Math.random() * (maxTop - 8));
      tries++;
    } while (
      tries < 8 &&
      newLeft < yesBox.right + 12 && newLeft + bw > yesBox.left - 12 &&
      newTop < yesBox.bottom + 12 && newTop + bh > yesBox.top - 12
    );
    noBtn.style.left = newLeft + 'px';
    noBtn.style.top = newTop + 'px';
    noBtn.style.right = 'auto';
    state.dodges++;
    dodgeNote.textContent = quips[state.dodges % quips.length];
  }

  ['pointerdown','mouseenter','focus','touchstart'].forEach(function(evt){
    noBtn.addEventListener(evt, function(e){
      e.preventDefault();
      moveNoButton();
    }, { passive: false });
  });
  noBtn.addEventListener('click', function(e){ e.preventDefault(); moveNoButton(); });

  yesBtn.addEventListener('click', function(){
    state.answer = 'yes';
    goTo(2);
  });

  var dateInput = document.getElementById('date-input');
  var continueBtn = document.getElementById('btn-continue');
  var today = new Date().toISOString().split('T')[0];
  dateInput.min = today;

  dateInput.addEventListener('change', function(){
    continueBtn.disabled = !dateInput.value;
  });

  continueBtn.addEventListener('click', function(){
    state.date = dateInput.value;
    goTo(3);
    submitResponse();
  });

  document.getElementById('btn-restart').addEventListener('click', function(){
    state = { dodges: 0, date: null, answer: 'yes' };
    dateInput.value = '';
    continueBtn.disabled = true;
    dodgeNote.textContent = '\u00A0';
    noBtn.style.left = ''; noBtn.style.top = ''; noBtn.style.right = '24px';
    document.getElementById('save-status').textContent = 'Opening WhatsApp…';
    goTo(1);
  });

  function formatDate(d){
    if(!d) return '—';
    var parts = d.split('-');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(parts[1],10)-1] + ' ' + parseInt(parts[2],10) + ', ' + parts[0];
  }

  function submitResponse(){
    document.getElementById('sum-answer').textContent = 'Yes';
    document.getElementById('sum-dodges').textContent = state.dodges;
    document.getElementById('sum-date').textContent = formatDate(state.date);

    var statusEl = document.getElementById('save-status');

    var honeypot = document.getElementById('hp-field').value;
    var elapsed = Date.now() - pageLoadedAt;
    if (honeypot || elapsed < 1500) {
      statusEl.textContent = 'Sent.';
      return;
    }

    var message =
      'ok\n' +
      'thanks:\n' +
      'time: ' + state.dodges + '\n' +
      'milte hai fir : ' + formatDate(state.date);

    var waLink = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + encodeURIComponent(message);

    statusEl.textContent = 'Opening WhatsApp…';
    setTimeout(function(){
      window.location.href = waLink;
    }, 600);
  }

})();
</script>
</body>
</html>
