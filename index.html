<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date Calculator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    color:  #00008B;
    margin: 40px;
  }
  h2 {
    margin-bottom: 20px;
  }
  label {
    font-size: 16px;
    margin-right: 10px;
  }
  input[type="date"] {
    font-size: 16px;
    padding: 5px;
  }
  button {
    margin-left: 10px;
    padding: 6px 14px;
    font-size: 16px;
  }
  table {
    margin-top: 30px;
    border-collapse: collapse;
    width: 400px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  th, td {
    border: 1px solid #333;
    padding: 10px 14px;
    text-align: center;
  }
  th {
    background: #333333;
    color: #ffffff;
  }
  tbody tr:nth-child(even) {
    background: #f2f2f2;
  }
  tbody tr:hover {
    background: #dbeeff;
  }
</style>
</head>
<body>

<h2>Date Calculator</h2>

<label for="baseDate">Enter Date:</label>
<input type="date" id="baseDate">
<button onclick="calculateDates()">Calculate</button>

<table id="resultTable" style="display:none;">
  <thead>
    <tr>
      <th>Day</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="resultBody">
  </tbody>
</table>

<script>
function calculateDates() {
  var input = document.getElementById('baseDate').value;
  if (!input) {
    alert('Please select a date first.');
    return;
  }

  var offsets = [0, 2, 6, 13, 20, 27, 41];
  var baseDate = new Date(input + 'T00:00:00');

  var tbody = document.getElementById('resultBody');
  tbody.innerHTML = '';

  offsets.forEach(function(days) {
    var newDate = new Date(baseDate);
    newDate.setDate(newDate.getDate() + days);

    var day = String(newDate.getDate()).padStart(2, '0');
    var month = String(newDate.getMonth() + 1).padStart(2, '0');
    var year = newDate.getFullYear();
    var formatted = day + '-' + month + '-' + year;

    var row = document.createElement('tr');
    row.innerHTML = '<td>Day ' + (days + 1) + '</td><td>' + formatted + '</td>';
    tbody.appendChild(row);
  });

  document.getElementById('resultTable').style.display = 'table';
}
</script>

</body>
</html>
